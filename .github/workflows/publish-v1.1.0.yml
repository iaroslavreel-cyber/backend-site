name: Publish Docker image v1.1.0

on:
  push:
    branches:
      - integration
    paths:
      - ".github/workflows/publish-v1.1.0.yml"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: iaroslavreel-cyber/backend-site
  IMAGE_TAG: v1.1.0

jobs:
  build-and-push:
    name: Build and publish Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Get code from tag v1.1.0
        uses: actions/checkout@v7
        with:
          ref: v1.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:integration-latest
          labels: |
            org.opencontainers.image.source=https://github.com/iaroslavreel-cyber/backend-site
            org.opencontainers.image.version=${{ env.IMAGE_TAG }}
            org.opencontainers.image.description=Integration Docker image for backend-site
